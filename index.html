<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Professional website showcasing services and contact information.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business - Home</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    line-height:1.6;
    background:#f4f4f4;
    color:#333;
}

header{
    background:#003366;
    color:white;
    padding:15px;
    text-align:center;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

section{
    padding:30px;
    max-width:1000px;
    margin:auto;
}

.hero img{
    width:100%;
    border-radius:10px;
}

.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

form{
    display:flex;
    flex-direction:column;
}

input,
textarea{
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px;
    background:#003366;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

footer{
    text-align:center;
    padding:20px;
    background:#003366;
    color:white;
    margin-top:30px;
}

#menu-btn{
    display:none;
}

@media(max-width:768px){

    #menu-btn{
        display:block;
        margin:auto;
    }

    nav ul{
        flex-direction:column;
        display:none;
    }

    nav.active ul{
        display:flex;
    }
}

</style>
</head>
<body>

<header>
    <h1>My Business</h1>

    <button id="menuBtn">☰ Menu</button>

    <nav id="navMenu">
        <ul>
            <li>index.html</li>
            <li>"services.html">Services</a></li>
            <li>"contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="hero">
        <img src="images/hero.jpgh2>Welcome to My Business</h2>
        <p id="greeting"></p>
    </section>

    <section>
        <h2>About Us</h2>
        <p>
            We provide quality solutions for businesses and individuals.
            Our goal is to deliver innovative and reliable services.
        </p>
    </section>

    <section>
        <h2>Current Date & Time</h2>
        <p id="datetime"></p>
    </section>

</main>

<footer>
    <p>&copy; 2026 My Business. All rights reserved.</p>
</footer>

<script>
// Mobile Menu Toggle

const menuBtn = document.getElementById("menu-btn");
const navMenu = document.getElementById("nav-menu");

if(menuBtn){
    menuBtn.addEventListener("click", () => {
        navMenu.classList.toggle("active");
    });
}

// Dynamic Greeting

const greeting = document.getElementById("greeting");

if(greeting){
    const hour = new Date().getHours();

    if(hour < 12){
        greeting.textContent = "Good Morning!";
    }
    else if(hour < 18){
        greeting.textContent = "Good Afternoon!";
    }
    else{
        greeting.textContent = "Good Evening!";
    }
}

// Date & Time

const dateTime = document.getElementById("datetime");

if(dateTime){
    setInterval(() => {
        dateTime.textContent = new Date().toLocaleString();
    }, 1000);
}

// Contact Form Validation

const form = document.getElementById("contactForm");

if(form){

    form.addEventListener("submit", function(e){

        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        const output = document.getElementById("formMessage");

        if(name === "" || email === "" || message === ""){
            output.textContent = "Please fill in all fields.";
            output.style.color = "red";
            return;
        }

        output.textContent = "Form submitted successfully!";
        output.style.color = "green";

        form.reset();
    });

}
</script>
</body>
</html>
